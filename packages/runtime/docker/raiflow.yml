daemon:
  host: "0.0.0.0"
  port: 3100
  mode: "env:RAIFLOW_MODE"
  apiKey: "env:RAIFLOW_API_KEY"

nano:
  rpc:
    - "env:NANO_RPC_URL"
  ws: []
  work: []

invoices:
  defaultExpirySeconds: 3600
  autoSweep: false

storage:
  driver: "sqlite"
  path: "/data/raiflow.db"

webhooks: []

logging:
  level: "info"
  format: "json"

