name: RFC proposal
description: Propose a design change or significant new direction
labels: ["rfc"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose a design change, new primitive, or significant new direction for RaiFlow.
        RFCs are lightweight — they exist to freeze decisions and record alternatives, not to create bureaucracy.

  - type: input
    id: title
    attributes:
      label: RFC title
      description: A short descriptive title for this RFC.
      placeholder: e.g. "Event delivery retry semantics"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences summarizing the proposal.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this change needed? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: design
    attributes:
      label: Proposed design
      description: Describe the design in as much detail as is useful. Include API shapes, type signatures, or flow descriptions where helpful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches were considered? Why were they rejected?
    validations:
      required: false

  - type: textarea
    id: drawbacks
    attributes:
      label: Drawbacks
      description: Are there any downsides, risks, or open questions?
    validations:
      required: false
