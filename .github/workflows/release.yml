name: Release

on:
  push:
    tags:
      - '@openrai/model@*'
      - '@openrai/webhook@*'
      - '@openrai/raiflow-sdk@*'

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Publish package
        run: pnpm release
        env:
          NODE_AUTH_TOKEN: ""
          NPM_TOKEN: ""
