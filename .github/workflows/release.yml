name: Release

on:
  push:
    tags:
      - '@openrai/model@*'
      - '@openrai/webhook@*'
      - '@openrai/raiflow-sdk@*'

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Upgrade npm for OIDC support
        run: |
          corepack enable
          corepack prepare npm@latest --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Resolve package directory from tag
        id: package
        run: |
          case "${GITHUB_REF_NAME}" in
            @openrai/model@*)
              echo "dir=packages/model" >> "$GITHUB_OUTPUT"
              ;;
            @openrai/webhook@*)
              echo "dir=packages/webhook" >> "$GITHUB_OUTPUT"
              ;;
            @openrai/raiflow-sdk@*)
              echo "dir=packages/raiflow-sdk" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported release tag: ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac

      - name: Publish tagged package
        working-directory: ${{ steps.package.outputs.dir }}
        run: npm publish --access public --provenance
