name: Container

on:
  push:
    branches: [main]
    tags: ['@openrai/runtime@*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/openrai/raiflow:latest
            ghcr.io/openrai/raiflow:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
