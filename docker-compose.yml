services:
  raiflow:
    image: ghcr.io/openrai/raiflow:latest
    restart: unless-stopped
    environment:
      NANO_RPC_URL: "https://rpc.nano.org"
      RAIFLOW_MODE: "custodial"           # required: "custodial" or "non-custodial"
      RAIFLOW_API_KEY: ""                  # required: set a strong secret
      # RAIFLOW_CUSTODY_SEED: ""           # required only for custodial mode
      # RAIFLOW_CUSTODY_REP: ""            # required only for custodial mode
    volumes:
      - raiflow-data:/data
    ports:
      - "127.0.0.1:3100:3100"  # Bind to localhost only — do NOT expose to public internet

volumes:
  raiflow-data:
